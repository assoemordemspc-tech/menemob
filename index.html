<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
  canvas { display: block; }
  #ui { position: fixed; top: 10px; left: 10px; color: #f00; font-size: 18px; pointer-events: none; }
</style>

<div id="ui">HP: <span id="hp">100</span> | SCORE: <span id="sc">0</span></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ===== CONFIGURAÇÃO =====
let player = { x: 400, y: 300, speed: 5, radius: 10, hp: 100, score: 0 };
let enemies = [];
let pBullets = []; // Balas do Player
let eBullets = []; // Balas dos Inimigos
let keys = {};
let mouse = { x: 0, y: 0, down: false };
let pCooldown = 0;

// ===== CONTROLES =====
window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => mouse.down = true;
window.onmouseup = () => mouse.down = false;

// ===== SPAWN DE INIMIGOS (IA QUE ATIRA) =====
function spawn() {
  if (enemies.length < 6) {
    enemies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      hp: 30,
      radius: 12,
      cooldown: 60, // Tempo entre tiros
      speed: 1.5
    });
  }
}
setInterval(spawn, 2000);

// ===== LÓGICA DO JOGO =====
function update() {
  // 1. Movimento Player (WASD)
  if (keys['w']) player.y -= player.speed;
  if (keys['s']) player.y += player.speed;
  if (keys['a']) player.x -= player.speed;
  if (keys['d']) player.x += player.speed;

  // 2. Tiro do Player
  pCooldown--;
  if (mouse.down && pCooldown <= 0) {
    let ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    pBullets.push({ x: player.x, y: player.y, vx: Math.cos(ang)*10, vy: Math.sin(ang)*10, life: 60 });
    pCooldown = 10;
  }

  // 3. IA DOS INIMIGOS
  enemies.forEach(en => {
    let dx = player.x - en.x;
    let dy = player.y - en.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let ang = Math.atan2(dy, dx);

    // Comportamento: Tenta manter 200px de distância
    if (dist > 220) {
      en.x += Math.cos(ang) * en.speed;
      en.y += Math.sin(ang) * en.speed;
    } else if (dist < 180) {
      en.x -= Math.cos(ang) * en.speed;
      en.y -= Math.sin(ang) * en.speed;
    }

    // ATAQUE DO INIMIGO (DISPARO REAL)
    en.cooldown--;
    if (en.cooldown <= 0 && dist < 600) {
      eBullets.push({
        x: en.x, 
        y: en.y, 
        vx: Math.cos(ang) * 5, // Bala mais lenta que a sua
        vy: Math.sin(ang) * 5, 
        life: 120 
      });
      en.cooldown = 90; // Reseta tempo de tiro
    }
  });

  // 4. BALAS (MOVER E COLIDIR)
  pBullets.forEach((b, i) => {
    b.x += b.vx; b.y += b.vy; b.life--;
    enemies.forEach(en => {
      if (Math.hypot(b.x - en.x, b.y - en.y) < en.radius) {
        en.hp -= 10; b.life = 0;
        if (en.hp <= 0) player.score += 50;
      }
    });
  });

  eBullets.forEach((eb, i) => {
    eb.x += eb.vx; eb.y += eb.vy; eb.life--;
    if (Math.hypot(eb.x - player.x, eb.y - player.y) < player.radius) {
      player.hp -= 5; eb.life = 0;
    }
  });

  // Limpeza
  pBullets = pBullets.filter(b => b.life > 0);
  eBullets = eBullets.filter(eb => eb.life > 0);
  enemies = enemies.filter(en => en.hp > 0);

  // UI
  document.getElementById("hp").innerText = Math.ceil(player.hp);
  document.getElementById("sc").innerText = player.score;

  if (player.hp <= 0) { alert("GAMEOVER"); location.reload(); }
}

// ===== DESENHO =====
function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Inimigos (Vermelhos)
  ctx.fillStyle = "red";
  enemies.forEach(en => {
    ctx.beginPath(); ctx.arc(en.x, en.y, en.radius, 0, Math.PI*2); ctx.fill();
  });

  // Player (Branco)
  ctx.fillStyle = "white";
  ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();

  // Tiros Player (Verde) e Inimigos (Amarelo)
  ctx.fillStyle = "#0f0";
  pBullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));
  
  ctx.fillStyle = "yellow";
  eBullets.forEach(eb => ctx.fillRect(eb.x, eb.y, 6, 6));
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>

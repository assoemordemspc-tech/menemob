<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; touch-action: none; }
  #ui { 
    position: fixed; top: 20px; left: 20px; color: #0f0; 
    pointer-events: none; text-shadow: 2px 2px #000; font-weight: bold; 
  }
  .bar { width: 200px; height: 10px; background: #333; border: 1px solid #555; margin-top: 5px; }
  #hp-fill { width: 100%; height: 100%; background: #f00; transition: width 0.1s; }
</style>

<div id="ui">
  <div>SISTEMA ATIVO: SOBREVIVÊNCIA</div>
  <div class="bar"><div id="hp-fill"></div></div>
  <div id="score" style="margin-top: 5px;">ABATES: 0</div>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const hpFill = document.getElementById("hp-fill");
const scoreDisplay = document.getElementById("score");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ===== ESTADO DO JOGO =====
let player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  speed: 4,
  radius: 8,
  hp: 100,
  vision: 200,
  score: 0
};

let enemies = [];
let bullets = [];
let keys = {};
let mouse = { x: 0, y: 0, pressing: false };
let shootCooldown = 0;

// ===== CONTROLES (PC) =====
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("mousedown", () => mouse.pressing = true);
window.addEventListener("mouseup", () => mouse.pressing = false);

// ===== SISTEMA DE SPAWN =====
function spawnEnemy() {
  // Spawna fora da visão para não "brotar" na frente do player
  const angle = Math.random() * Math.PI * 2;
  const dist = canvas.width > canvas.height ? canvas.width : canvas.height;
  
  enemies.push({
    x: player.x + Math.cos(angle) * dist,
    y: player.y + Math.sin(angle) * dist,
    speed: 1.5 + Math.random(),
    hp: 30,
    radius: 7,
    color: "#ff4444"
  });
}
setInterval(spawnEnemy, 1500);

// ===== LÓGICA DO TIRO =====
function shoot() {
  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  bullets.push({
    x: player.x,
    y: player.y,
    vx: Math.cos(angle) * 10,
    vy: Math.sin(angle) * 10,
    life: 80
  });
}

// ===== UPDATE PRINCIPAL =====
function update() {
  // 1. MOVIMENTO WASD
  let moveX = 0;
  let moveY = 0;
  if (keys["w"] || keys["arrowup"]) moveY -= 1;
  if (keys["s"] || keys["arrowdown"]) moveY += 1;
  if (keys["a"] || keys["arrowleft"]) moveX -= 1;
  if (keys["d"] || keys["arrowright"]) moveX += 1;

  if (moveX !== 0 || moveY !== 0) {
    const mag = Math.sqrt(moveX * moveX + moveY * moveY);
    player.x += (moveX / mag) * player.speed;
    player.y += (moveY / mag) * player.speed;
  }

  // 2. CADÊNCIA DE TIRO
  shootCooldown--;
  if (mouse.pressing && shootCooldown <= 0) {
    shoot();
    shootCooldown = 12; 
  }

  // 3. IA DOS INIMIGOS
  enemies.forEach(en => {
    let dx = player.x - en.x;
    let dy = player.y - en.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    // Chase: Se estiver a menos de 500px, persegue
    if (dist < 500) {
      en.x += (dx/dist) * en.speed;
      en.y += (dy/dist) * en.speed;
    }

    // Dano por contato
    if (dist < player.radius + en.radius) {
      player.hp -= 0.5;
    }
  });

  // 4. COLISÃO BALA -> INIMIGO
  bullets.forEach((b, bi) => {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    enemies.forEach((en) => {
      let dx = b.x - en.x;
      let dy = b.y - en.y;
      if (Math.sqrt(dx*dx + dy*dy) < en.radius + 5) {
        en.hp -= 10;
        b.life = 0; // Destrói bala
        if(en.hp <= 0) player.score += 10;
      }
    });
  });

  // Limpeza
  bullets = bullets.filter(b => b.life > 0);
  enemies = enemies.filter(en => en.hp > 0);

  // UI
  hpFill.style.width = player.hp + "%";
  scoreDisplay.innerText = `ABATES: ${player.score}`;
  
  if(player.hp <= 0) {
    alert("SISTEMA CORROMPIDO. SCORE: " + player.score);
    location.reload();
  }
}

// ===== RENDERIZAÇÃO =====
function draw() {
  ctx.fillStyle = "#0a0a0a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid Simples
  ctx.strokeStyle = "#151515";
  for(let i=0; i<canvas.width; i+=100) {
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
  }

  // Inimigos
  enemies.forEach(en => {
    ctx.fillStyle = en.color;
    ctx.beginPath(); ctx.arc(en.x, en.y, en.radius, 0, Math.PI*2); ctx.fill();
    // Barra de vida mini em cima do inimigo
    ctx.fillStyle = "#000"; ctx.fillRect(en.x-10, en.y-12, 20, 3);
    ctx.fillStyle = "#f00"; ctx.fillRect(en.x-10, en.y-12, (en.hp/30)*20, 3);
  });

  // Player
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();

  // Balas
  ctx.fillStyle = "#0ff";
  bullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 4, 4));

  // Mira Visual
  ctx.strokeStyle = "rgba(0, 255, 255, 0.2)";
  ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
  ctx.setLineDash([]);

  // FOG OF WAR (Destaque do Player)
  ctx.save();
  ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = "destination-out";
  let grd = ctx.createRadialGradient(player.x, player.y, 50, player.x, player.y, player.vision);
  grd.addColorStop(0, "rgba(255, 255, 255, 1)");
  grd.addColorStop(1, "rgba(255, 255, 255, 0)");
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(player.x, player.y, player.vision, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

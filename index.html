<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #ui { position: fixed; top: 15px; left: 15px; color: #f00; pointer-events: none; z-index: 10; }
  .bar { width: 200px; height: 10px; background: #333; border: 1px solid #444; }
  #hp-fill { width: 100%; height: 100%; background: #f00; transition: width 0.1s; }
</style>

<div id="ui">
  <div>SISTEMA DE ALERTA: INVASÃO</div>
  <div class="bar"><div id="hp-fill"></div></div>
  <div id="sc" style="color: #0ff; margin-top: 5px;">DATA: 0</div>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ===== ESTADO =====
let player = { x: window.innerWidth/2, y: window.innerHeight/2, speed: 5, radius: 10, hp: 100, score: 0 };
let enemies = [];
let pBullets = []; 
let eBullets = []; 
let hitFlash = 0; // Feedback de dano
let keys = {};
let mouse = { x: 0, y: 0, down: false };
let pCooldown = 0;

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => mouse.down = true;
window.onmouseup = () => mouse.down = false;

function spawn() {
  if (enemies.length < 6) {
    enemies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      hp: 30, radius: 12, speed: 1.8, cooldown: 30 // TESTE EXTREMO: Tiros rápidos
    });
  }
}
setInterval(spawn, 2000);

function update() {
  // Movimento
  if (keys['w']) player.y -= player.speed;
  if (keys['s']) player.y += player.speed;
  if (keys['a']) player.x -= player.speed;
  if (keys['d']) player.x += player.speed;

  // Tiro Player
  pCooldown--;
  if (mouse.down && pCooldown <= 0) {
    let ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    pBullets.push({ x: player.x, y: player.y, vx: Math.cos(ang)*12, vy: Math.sin(ang)*12, life: 60 });
    pCooldown = 10;
  }

  // IA Agressiva
  enemies.forEach(en => {
    let dx = player.x - en.x;
    let dy = player.y - en.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let ang = Math.atan2(dy, dx);

    // Kiting
    if (dist > 250) { en.x += Math.cos(ang)*en.speed; en.y += Math.sin(ang)*en.speed; }
    else if (dist < 150) { en.x -= Math.cos(ang)*en.speed; en.y -= Math.sin(ang)*en.speed; }

    // TIRO INIMIGO (CORRIGIDO)
    en.cooldown--;
    if (en.cooldown <= 0) {
      eBullets.push({
        x: en.x, y: en.y,
        vx: Math.cos(ang) * 10, // TESTE EXTREMO: Balas velozes
        vy: Math.sin(ang) * 10,
        life: 100
      });
      en.cooldown = 30; // Metralhadora
    }
  });

  // Colisões
  eBullets.forEach(eb => {
    eb.x += eb.vx; eb.y += eb.vy; eb.life--;
    if (Math.hypot(eb.x - player.x, eb.y - player.y) < player.radius) {
      player.hp -= 5;
      eb.life = 0;
      hitFlash = 5; // Ativa o flash vermelho
    }
  });

  pBullets.forEach(pb => {
    pb.x += pb.vx; pb.y += pb.vy; pb.life--;
    enemies.forEach(en => {
      if (Math.hypot(pb.x - en.x, pb.y - en.y) < en.radius) {
        en.hp -= 10; pb.life = 0;
        if(en.hp <= 0) player.score += 100;
      }
    });
  });

  eBullets = eBullets.filter(eb => eb.life > 0);
  pBullets = pBullets.filter(pb => pb.life > 0);
  enemies = enemies.filter(en => en.hp > 0);

  document.getElementById("hp-fill").style.width = player.hp + "%";
  document.getElementById("sc").innerText = "DATA_SCORE: " + player.score;
  if(player.hp <= 0) location.reload();
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Efeito de Dano (Hit Flash)
  if (hitFlash > 0) {
    ctx.fillStyle = "rgba(255, 0, 0, 0.4)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    hitFlash--;
  }

  // Desenhar Balas Inimigas (O FIX REAL)
  ctx.save();
  ctx.fillStyle = "orange";
  ctx.shadowBlur = 15;
  ctx.shadowColor = "orange";
  eBullets.forEach(eb => {
    ctx.beginPath();
    ctx.arc(eb.x, eb.y, 5, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();

  // Desenhar Player
  ctx.fillStyle = "white";
  ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();

  // Desenhar Inimigos
  ctx.fillStyle = "red";
  enemies.forEach(en => {
    ctx.beginPath(); ctx.arc(en.x, en.y, en.radius, 0, Math.PI*2); ctx.fill();
  });

  // Balas Player
  ctx.fillStyle = "#0ff";
  pBullets.forEach(pb => ctx.fillRect(pb.x-2, pb.y-2, 4, 4));
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>

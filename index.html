<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpUoutk0exFpw3C39myNwGtKLjJcOv41I",
  authDomain: "noobmoba-708f5.firebaseapp.com",
  projectId: "noobmoba-708f5",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== PLAYER =====
const playerId = Math.random().toString(36).substr(2, 9);

let player = {
  x: Math.random()*500+100,
  y: Math.random()*300+100,
  color: ["red","blue","green","yellow"][Math.floor(Math.random()*4)],
  hp: 100,
  lastUpdate: Date.now()
};

let players = {};

// ===== INPUT =====
canvas.addEventListener("click", move);

function move(e){
  player.x = e.clientX;
  player.y = e.clientY;
  updatePlayer();
}

// ===== UPDATE FIREBASE =====
async function updatePlayer(){
  player.lastUpdate = Date.now();
  await setDoc(doc(db, "players", playerId), player);
}

// ===== REMOVER PLAYER =====
window.addEventListener("beforeunload", ()=>{
  deleteDoc(doc(db, "players", playerId));
});

// ===== OUVIR PLAYERS =====
onSnapshot(collection(db, "players"), (snapshot)=>{
  players = {};
  snapshot.forEach(doc=>{
    players[doc.id] = doc.data();
  });
});

// ===== TIROS =====
let bullets = [];

canvas.addEventListener("dblclick", shoot);

function shoot(){
  bullets.push({
    x: player.x,
    y: player.y,
    dx: (Math.random()-0.5)*8,
    dy: (Math.random()-0.5)*8,
    owner: playerId
  });
}

// ===== COMBATE =====
function checkHits(){
  bullets.forEach(b => {
    for(let id in players){
      if(id === b.owner) continue;

      let p = players[id];

      let dx = p.x - b.x;
      let dy = p.y - b.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 10){
        p.hp -= 10;

        // Atualiza o alvo no banco
        setDoc(doc(db, "players", id), p);

        b.hit = true;
      }
    }
  });

  bullets = bullets.filter(b => !b.hit);
}

// ===== MORTE =====
function checkDeath(){
  if(player.hp <= 0){
    player.hp = 100;

    // respawn
    player.x = Math.random()*500+100;
    player.y = Math.random()*300+100;

    updatePlayer();
  }
}

// ===== LOOP =====
function update(){

  bullets.forEach(b=>{
    b.x += b.dx;
    b.y += b.dy;
  });

  checkHits();
  checkDeath();
}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // MAPA
  ctx.fillStyle="#222";
  ctx.fillRect(50,50,canvas.width-100,canvas.height-100);

  // BASES
  ctx.fillStyle="blue";
  ctx.fillRect(60,canvas.height/2-30,20,60);

  ctx.fillStyle="red";
  ctx.fillRect(canvas.width-80,canvas.height/2-30,20,60);

  // PLAYERS
  for(let id in players){
    let p = players[id];

    if(Date.now() - p.lastUpdate > 5000) continue;

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,10,0,Math.PI*2);
    ctx.fill();

    // HP BAR
    ctx.fillStyle="red";
    ctx.fillRect(p.x-10,p.y-20,20,4);

    ctx.fillStyle="green";
    ctx.fillRect(p.x-10,p.y-20,(p.hp/100)*20,4);
  }

  // FOG
  ctx.fillStyle="rgba(0,0,0,0.85)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.globalCompositeOperation = "destination-out";

  let grd = ctx.createRadialGradient(player.x,player.y,20,player.x,player.y,150);
  grd.addColorStop(0,"rgba(0,0,0,1)");
  grd.addColorStop(1,"rgba(0,0,0,0)");

  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(player.x,player.y,150,0,Math.PI*2);
  ctx.fill();

  ctx.globalCompositeOperation = "source-over";

  // BULLETS
  ctx.fillStyle="white";
  bullets.forEach(b=>{
    ctx.fillRect(b.x,b.y,4,4);
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
updatePlayer();

</script>

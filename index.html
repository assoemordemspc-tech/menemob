<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #ui { position: fixed; top: 15px; left: 15px; color: #0f0; pointer-events: none; }
  .bar { width: 200px; height: 12px; background: #333; border: 1px solid #555; }
  #hp-fill { width: 100%; height: 100%; background: #f00; }
</style>

<div id="ui">
  <div>SISTEMA DE DEFESA</div>
  <div class="bar"><div id="hp-fill"></div></div>
  <div id="status">STATUS: ONLINE</div>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ===== ESTADO DO MUNDO =====
let player = { x: 400, y: 300, hp: 100, radius: 12, speed: 5 };
let enemies = [];
let bullets = []; // VAMOS USAR APENAS UM ARRAY PARA TODAS AS BALAS
let keys = {};
let mouse = { x: 0, y: 0, down: false };
let pCooldown = 0;

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => mouse.down = true;
window.onmouseup = () => mouse.down = false;

// Spawn de Inimigos
function spawn() {
  if (enemies.length < 5) {
    enemies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      hp: 30,
      radius: 15,
      cooldown: 50,
      speed: 2
    });
  }
}
setInterval(spawn, 2000);

function update() {
  // 1. Movimento Player
  if (keys['w']) player.y -= player.speed;
  if (keys['s']) player.y += player.speed;
  if (keys['a']) player.x -= player.speed;
  if (keys['d']) player.x += player.speed;

  // 2. Tiro do Player
  pCooldown--;
  if (mouse.down && pCooldown <= 0) {
    let ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    bullets.push({
      x: player.x, y: player.y,
      vx: Math.cos(ang) * 10, vy: Math.sin(ang) * 10,
      type: 'player', color: '#0ff', radius: 4
    });
    pCooldown = 10;
  }

  // 3. IA e Tiro do Inimigo
  enemies.forEach(en => {
    let dx = player.x - en.x;
    let dy = player.y - en.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let ang = Math.atan2(dy, dx);

    // Se move em direção ao player até 250px
    if (dist > 250) {
      en.x += Math.cos(ang) * en.speed;
      en.y += Math.sin(ang) * en.speed;
    }

    // DISPARO DO INIMIGO
    en.cooldown--;
    if (en.cooldown <= 0) {
      bullets.push({
        x: en.x, y: en.y,
        vx: Math.cos(ang) * 6, vy: Math.sin(ang) * 6,
        type: 'enemy', color: '#ff0', radius: 6 // BALA AMARELA GRANDE
      });
      en.cooldown = 60; // Atira a cada 1 segundo aprox.
    }
  });

  // 4. Lógica de todas as Balas (Movimento e Colisão)
  bullets.forEach((b, index) => {
    b.x += b.vx;
    b.y += b.vy;

    // Se a bala sair da tela, remove
    if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
      bullets.splice(index, 1);
      return;
    }

    // Colisão Bala de Inimigo -> Player
    if (b.type === 'enemy') {
      let d = Math.hypot(player.x - b.x, player.y - b.y);
      if (d < player.radius + b.radius) {
        player.hp -= 10; // DANO DA BALA
        bullets.splice(index, 1);
      }
    }

    // Colisão Bala de Player -> Inimigos
    if (b.type === 'player') {
      enemies.forEach((en, eIndex) => {
        let d = Math.hypot(en.x - b.x, en.y - b.y);
        if (d < en.radius + b.radius) {
          en.hp -= 10;
          bullets.splice(index, 1);
        }
      });
    }
  });

  // 5. Limpeza de Inimigos Mortos
  enemies = enemies.filter(en => en.hp > 0);

  // Atualiza UI
  document.getElementById("hp-fill").style.width = player.hp + "%";
  if (player.hp <= 0) {
    alert("SISTEMA DESTRUÍDO");
    location.reload();
  }
}

function draw() {
  // Fundo Limpo
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // DESENHAR TODAS AS BALAS (LOOP ÚNICO)
  bullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fill();
  });

  // DESENHAR INIMIGOS
  ctx.fillStyle = "red";
  enemies.forEach(en => {
    ctx.beginPath();
    ctx.arc(en.x, en.y, en.radius, 0, Math.PI * 2);
    ctx.fill();
  });

  // DESENHAR PLAYER
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
  ctx.fill();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

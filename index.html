<canvas id="game"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyCpUoutk0exFpw3C39myNwGtKLjJcOv41I",
  authDomain: "noobmoba-708f5.firebaseapp.com",
  projectId: "noobmoba-708f5",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== CANVAS =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ===== PLAYER ID =====
let playerId = localStorage.getItem("playerId") || Math.random().toString(36).substr(2, 9);
localStorage.setItem("playerId", playerId);

// ===== PLAYER OBJECT =====
let player = {
  x: Math.random() * 500 + 100,
  y: Math.random() * 300 + 100,
  targetX: 0,
  targetY: 0,
  speed: 3,
  color: ["#ff4444", "#4444ff", "#44ff44", "#ffff44"][Math.floor(Math.random() * 4)],
  hp: 100,
  lastUpdate: Date.now()
};
player.targetX = player.x;
player.targetY = player.y;

let players = {};
let bullets = [];

// ===== INPUTS =====
canvas.addEventListener("click", setTarget);
canvas.addEventListener("touchstart", (e) => {
  const t = e.touches[0];
  setTarget({ clientX: t.clientX, clientY: t.clientY });
});

function setTarget(e) {
  player.targetX = e.clientX;
  player.targetY = e.clientY;
}

canvas.addEventListener("dblclick", shoot);
function shoot() {
  bullets.push({
    x: player.x,
    y: player.y,
    dx: (player.targetX - player.x) / 20 || 5,
    dy: (player.targetY - player.y) / 20 || 0,
    owner: playerId,
    hit: false
  });
}

// ===== FIREBASE SYNC & CLEANUP =====
async function updatePlayer() {
  player.lastUpdate = Date.now();
  await setDoc(doc(db, "players", playerId), player);
}

// Limpeza de fantasmas (Deleta do banco players inativos por mais de 5s)
async function cleanGhosts() {
  for (let id in players) {
    if (id === playerId) continue;
    let p = players[id];
    if (!p.lastUpdate || Date.now() - p.lastUpdate > 5000) {
      try {
        await deleteDoc(doc(db, "players", id));
      } catch (e) { console.error("Erro ao limpar ghost:", e); }
    }
  }
}
setInterval(cleanGhosts, 4000);

onSnapshot(collection(db, "players"), (snapshot) => {
  let activePlayers = {};
  snapshot.forEach(doc => {
    activePlayers[doc.id] = doc.data();
  });
  players = activePlayers;
});

// ===== GAME LOGIC =====
function update() {
  let dx = player.targetX - player.x;
  let dy = player.targetY - player.y;
  let dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > 1) {
    player.x += (dx / dist) * player.speed;
    player.y += (dy / dist) * player.speed;
  }

  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
  });

  // Check Hits
  bullets.forEach(b => {
    for (let id in players) {
      if (id === b.owner) continue;
      let p = players[id];
      let dist = Math.hypot(p.x - b.x, p.y - b.y);
      if (dist < 10) {
        b.hit = true;
        if (id === playerId) player.hp -= 2; // Dano local
      }
    }
  });
  bullets = bullets.filter(b => !b.hit);

  if (player.hp <= 0) {
    player.hp = 100;
    player.x = 100; player.y = 100;
  }

  updatePlayer();
}

// ===== RENDER =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1. CHÃO / ARENA
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Grade de fundo (opcional para referência visual)
  ctx.strokeStyle = "#333";
  for(let i=0; i<canvas.width; i+=50) {
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
  }

  // 2. OUTROS PLAYERS
  for (let id in players) {
    if (id === playerId) continue;
    let p = players[id];
    
    // Filtro de tempo para não desenhar fantasmas no canvas
    if (!p.lastUpdate || Date.now() - p.lastUpdate > 2000) continue;

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 3. PLAYER LOCAL
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(player.x, player.y, 6, 0, Math.PI * 2);
  ctx.fill();

  // 4. TIROS
  ctx.fillStyle = "#fff";
  bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));

  // 5. FOG OF WAR (SISTEMA DE MÁSCARA)
  ctx.save();
  ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; // Escuridão
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Recorta o círculo de visão
  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath();
  ctx.arc(player.x, player.y, 150, 0, Math.PI * 2); // Raio de visão: 150
  ctx.fill();
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; touch-action: none; }
</style>

<canvas id="game"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyCpUoutk0exFpw3C39myNwGtKLjJcOv41I",
  authDomain: "noobmoba-708f5.firebaseapp.com",
  projectId: "noobmoba-708f5",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== CANVAS =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== PLAYER ID FIXO =====
let playerId = localStorage.getItem("playerId");

if(!playerId){
  playerId = Math.random().toString(36).substr(2, 9);
  localStorage.setItem("playerId", playerId);
}

// ===== PLAYER =====
let player = {
  x: Math.random()*500+100,
  y: Math.random()*300+100,
  targetX: 0,
  targetY: 0,
  speed: 3,
  color: ["red","blue","green","yellow"][Math.floor(Math.random()*4)],
  hp: 100,
  lastUpdate: Date.now()
};

player.targetX = player.x;
player.targetY = player.y;

let players = {};
let bullets = [];

// ===== INPUT (MOBILE + DESKTOP) =====
canvas.addEventListener("click", setTarget);

canvas.addEventListener("touchstart", (e)=>{
  const t = e.touches[0];
  setTarget({ clientX: t.clientX, clientY: t.clientY });
});

function setTarget(e){
  player.targetX = e.clientX;
  player.targetY = e.clientY;
}

// ===== TIRO =====
canvas.addEventListener("dblclick", shoot);

function shoot(){
  bullets.push({
    x: player.x,
    y: player.y,
    dx: (Math.random()-0.5)*8,
    dy: (Math.random()-0.5)*8,
    owner: playerId
  });
}

// ===== FIREBASE =====
async function updatePlayer(){
  player.lastUpdate = Date.now();
  await setDoc(doc(db, "players", playerId), player);
}

window.addEventListener("beforeunload", ()=>{
  deleteDoc(doc(db, "players", playerId));
});

onSnapshot(collection(db, "players"), (snapshot)=>{
  players = {};
  snapshot.forEach(doc=>{
    players[doc.id] = doc.data();
  });
});

// ===== COMBATE =====
function checkHits(){
  bullets.forEach(b => {
    for(let id in players){
      if(id === b.owner) continue;

      let p = players[id];

      let dx = p.x - b.x;
      let dy = p.y - b.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 10){
        p.hp -= 10;
        setDoc(doc(db, "players", id), p);
        b.hit = true;
      }
    }
  });

  bullets = bullets.filter(b => !b.hit);
}

function checkDeath(){
  if(player.hp <= 0){
    player.hp = 100;
    player.x = Math.random()*500+100;
    player.y = Math.random()*300+100;
  }
}

// ===== UPDATE =====
function update(){

  // movimento suave
  let dx = player.targetX - player.x;
  let dy = player.targetY - player.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  if(dist > 1){
    player.x += (dx/dist) * player.speed;
    player.y += (dy/dist) * player.speed;
  }

  bullets.forEach(b=>{
    b.x += b.dx;
    b.y += b.dy;
  });

  checkHits();
  checkDeath();

  updatePlayer();
}

// ===== DRAW =====
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // MAPA
  ctx.fillStyle="#222";
  ctx.fillRect(50,50,canvas.width-100,canvas.height-100);

  // BASES
  ctx.fillStyle="blue";
  ctx.fillRect(60,canvas.height/2-30,20,60);

  ctx.fillStyle="red";
  ctx.fillRect(canvas.width-80,canvas.height/2-30,20,60);

  // PLAYERS
  for(let id in players){
    let p = players[id];

    if(Date.now() - p.lastUpdate > 3000) continue;

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,6,0,Math.PI*2);
    ctx.fill();
  }

  // PLAYER LOCAL (garantia)
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(player.x, player.y, 7, 0, Math.PI*2);
  ctx.fill();

  // BULLETS
  ctx.fillStyle="white";
  bullets.forEach(b=>{
    ctx.fillRect(b.x,b.y,3,3);
  });

  // FOG (ajustado)
  ctx.save();

  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.globalCompositeOperation = "destination-out";

  ctx.beginPath();
  ctx.arc(player.x, player.y, 300, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ===== LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>

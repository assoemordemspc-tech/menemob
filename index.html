<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
  canvas { display: block; background: #000; }
  #ui { position: fixed; top: 15px; left: 15px; color: #0f0; pointer-events: none; z-index: 10; }
  .bar { width: 200px; height: 10px; background: #333; }
  #hp-fill { width: 100%; height: 100%; background: #f00; }
</style>

<div id="ui">
  <div>SISTEMA DE TESTE: BALAS</div>
  <div class="bar"><div id="hp-fill"></div></div>
  <div id="sc">SCORE: 0</div>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let player = { x: window.innerWidth/2, y: window.innerHeight/2, speed: 5, radius: 10, hp: 100, score: 0 };
let enemies = [];
let pBullets = []; 
let eBullets = []; 
let keys = {};
let mouse = { x: 0, y: 0, down: false };
let pCooldown = 0;

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => mouse.down = true;
window.onmouseup = () => mouse.down = false;

function spawn() {
  if (enemies.length < 5) {
    enemies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      hp: 30, radius: 12, speed: 2, cooldown: 40 // Inimigo atira rápido
    });
  }
}
setInterval(spawn, 2000);

function update() {
  // 1. Movimento WASD
  if (keys['w']) player.y -= player.speed;
  if (keys['s']) player.y += player.speed;
  if (keys['a']) player.x -= player.speed;
  if (keys['d']) player.x += player.speed;

  // 2. Tiro Player
  pCooldown--;
  if (mouse.down && pCooldown <= 0) {
    let ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    pBullets.push({ x: player.x, y: player.y, vx: Math.cos(ang)*10, vy: Math.sin(ang)*10, life: 100 });
    pCooldown = 10;
  }

  // 3. IA e Tiro Inimigo
  enemies.forEach(en => {
    let dx = player.x - en.x;
    let dy = player.y - en.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let ang = Math.atan2(dy, dx);

    // Movimento
    if(dist > 200) { en.x += Math.cos(ang)*en.speed; en.y += Math.sin(ang)*en.speed; }

    en.cooldown--;
    if (en.cooldown <= 0) {
      // CRÍTICO: Criando a bala laranja
      eBullets.push({ x: en.x, y: en.y, vx: Math.cos(ang)*7, vy: Math.sin(ang)*7, life: 100 });
      en.cooldown = 40; 
    }
  });

  // 4. Mover Balas
  pBullets.forEach(b => { b.x += b.vx; b.y += b.vy; b.life--; });
  eBullets.forEach(b => { b.x += b.vx; b.y += b.vy; b.life--; });

  // 5. Colisão Simples
  eBullets.forEach(b => {
    if(Math.hypot(b.x - player.x, b.y - player.y) < player.radius) { player.hp -= 2; b.life = 0; }
  });
  pBullets.forEach(b => {
    enemies.forEach(en => {
      if(Math.hypot(b.x - en.x, b.y - en.y) < en.radius) { en.hp -= 10; b.life = 0; if(en.hp<=0) player.score += 50; }
    });
  });

  pBullets = pBullets.filter(b => b.life > 0);
  eBullets = eBullets.filter(b => b.life > 0);
  enemies = enemies.filter(en => en.hp > 0);
  document.getElementById("hp-fill").style.width = player.hp + "%";
}

function draw() {
  // Limpeza total a cada frame
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // DESENHAR BALAS PLAYER (CIANO)
  ctx.fillStyle = "#0ff";
  pBullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.closePath();
  });

  // DESENHAR BALAS INIMIGO (LARANJA)
  ctx.fillStyle = "#f90";
  eBullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.closePath();
  });

  // DESENHAR INIMIGOS (VERMELHO)
  ctx.fillStyle = "red";
  enemies.forEach(en => {
    ctx.beginPath();
    ctx.arc(en.x, en.y, en.radius, 0, Math.PI*2);
    ctx.fill();
    ctx.closePath();
  });

  // DESENHAR PLAYER (BRANCO)
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
  ctx.fill();
  ctx.closePath();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; touch-action: none; }
  #ui { 
    position: fixed; top: 20px; left: 20px; color: #0f0; 
    pointer-events: none; text-shadow: 2px 2px #000; z-index: 10;
  }
  .bar { width: 200px; height: 10px; background: #333; border: 1px solid #555; }
  #hp-fill { width: 100%; height: 100%; background: #f00; }
</style>

<div id="ui">
  <div>STATUS: OPERACIONAL</div>
  <div class="bar"><div id="hp-fill"></div></div>
  <div id="score">ABATES: 0</div>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Garantir que o canvas ocupe a tela toda
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ===== ESTADO DO JOGO =====
let player = {
  x: window.innerWidth / 2,
  y: window.innerHeight / 2,
  speed: 5,
  radius: 10,
  hp: 100,
  score: 0
};

let enemies = [];
let bullets = [];
let keys = {};
let mouse = { x: 0, y: 0, pressing: false };
let shootCooldown = 0;

// ===== INPUTS =====
window.addEventListener("keydown", e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("mousedown", () => { mouse.pressing = true; });
window.addEventListener("mouseup", () => { mouse.pressing = false; });

// ===== FUNÇÃO DE SPAWN (Corrigida para aparecer na tela) =====
function spawnEnemy() {
  if (enemies.length < 15) { // Limite de inimigos simultâneos
    enemies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      speed: 1 + Math.random(),
      hp: 30,
      radius: 8
    });
  }
}
setInterval(spawnEnemy, 2000);

// ===== LÓGICA PRINCIPAL =====
function update() {
  // 1. Movimento WASD
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;

  // 2. Tiro
  shootCooldown--;
  if (mouse.pressing && shootCooldown <= 0) {
    const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    bullets.push({
      x: player.x,
      y: player.y,
      vx: Math.cos(angle) * 12,
      vy: Math.sin(angle) * 12,
      life: 60
    });
    shootCooldown = 10;
  }

  // 3. Atualizar Inimigos
  enemies.forEach(en => {
    let dx = player.x - en.x;
    let dy = player.y - en.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    // Perseguição
    if (dist > 5) {
      en.x += (dx/dist) * en.speed;
      en.y += (dy/dist) * en.speed;
    }

    // Dano ao player
    if (dist < player.radius + en.radius) {
      player.hp -= 0.2;
    }
  });

  // 4. Colisão Bala -> Inimigo
  bullets.forEach((b, bi) => {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    enemies.forEach((en, ei) => {
      let dx = b.x - en.x;
      let dy = b.y - en.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < en.radius + 5) {
        en.hp -= 10;
        b.life = 0;
        if (en.hp <= 0) player.score++;
      }
    });
  });

  // Limpeza
  enemies = enemies.filter(en => en.hp > 0);
  bullets = bullets.filter(b => b.life > 0);

  // Atualizar UI
  document.getElementById("hp-fill").style.width = player.hp + "%";
  document.getElementById("score").innerText = "ABATES: " + player.score;

  if (player.hp <= 0) {
    player.hp = 100;
    player.score = 0;
    player.x = canvas.width / 2;
    player.y = canvas.height / 2;
  }
}

// ===== DESENHO =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Fundo
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Inimigos (Vermelhos)
  ctx.fillStyle = "red";
  enemies.forEach(en => {
    ctx.beginPath();
    ctx.arc(en.x, en.y, en.radius, 0, Math.PI*2);
    ctx.fill();
  });

  // Player (Branco)
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
  ctx.fill();

  // Tiros (Ciano)
  ctx.fillStyle = "cyan";
  bullets.forEach(b => {
    ctx.fillRect(b.x, b.y, 4, 4);
  });

  // Mira
  ctx.strokeStyle = "rgba(0, 255, 255, 0.3)";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(mouse.x, mouse.y);
  ctx.stroke();

  // Fog of War Simples (Removi o complexo para garantir que você veja o jogo primeiro)
  ctx.save();
  ctx.globalCompositeOperation = "destination-over"; 
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width, canvas.height);
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
  canvas { display: block; touch-action: none; cursor: crosshair; }
  #ui { position: fixed; top: 10px; left: 10px; color: white; pointer-events: none; }
</style>

<div id="ui">HP: <span id="hp">100</span></div>
<canvas id="game"></canvas>

<script>
// ===== SETUP INICIAL =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const hpDisplay = document.getElementById("hp");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ===== ESTADO DO JOGO =====
let player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  targetX: canvas.width / 2,
  targetY: canvas.height / 2,
  speed: 4,
  radius: 6,
  hp: 100,
  vision: 150 // Raio do Fog of War
};

let bullets = [];
let enemies = []; // Adicionei alguns alvos para você testar o tiro

// Criar alguns "alvos" estáticos no mapa
for(let i=0; i<10; i++) {
  enemies.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    color: "#ff4444"
  });
}

// ===== INPUTS =====
canvas.addEventListener("mousedown", (e) => {
  player.targetX = e.clientX;
  player.targetY = e.clientY;
});

canvas.addEventListener("touchstart", (e) => {
  const t = e.touches[0];
  player.targetX = t.clientX;
  player.targetY = t.clientY;
});

// Tiro no Espaço ou Clique Duplo
window.addEventListener("keydown", (e) => { if(e.code === "Space") shoot(); });
canvas.addEventListener("dblclick", shoot);

function shoot() {
  const angle = Math.atan2(player.targetY - player.y, player.targetX - player.x);
  bullets.push({
    x: player.x,
    y: player.y,
    vx: Math.cos(angle) * 8,
    vy: Math.sin(angle) * 8,
    life: 100
  });
}

// ===== LÓGICA =====
function update() {
  // Movimento
  let dx = player.targetX - player.x;
  let dy = player.targetY - player.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  if(dist > 2) {
    player.x += (dx/dist) * player.speed;
    player.y += (dy/dist) * player.speed;
  }

  // Balas
  bullets.forEach((b, index) => {
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if(b.life <= 0) bullets.splice(index, 1);
  });
}

// ===== RENDERIZAÇÃO =====
function draw() {
  // 1. Limpar e Fundo (O que está "dentro" do mapa)
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Desenhar grid de fundo
  ctx.strokeStyle = "#222";
  for(let i=0; i<canvas.width; i+=50) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
  }

  // 2. Desenhar Objetos (Enemies/Alvos)
  enemies.forEach(en => {
    ctx.fillStyle = en.color;
    ctx.beginPath();
    ctx.arc(en.x, en.y, 5, 0, Math.PI*2);
    ctx.fill();
  });

  // 3. Desenhar Player
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
  ctx.fill();

  // 4. Desenhar Tiros
  ctx.fillStyle = "yellow";
  bullets.forEach(b => {
    ctx.fillRect(b.x-2, b.y-2, 4, 4);
  });

  // 5. FOG OF WAR (O CORTE DEFINITIVO)
  ctx.save();
  // Camada de escuridão total
  ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Operação de "recorte" para abrir a visão
  ctx.globalCompositeOperation = "destination-out";
  
  ctx.beginPath();
  // Gradiente para suavizar a borda da visão (opcional, mas fica mais bonito)
  let grd = ctx.createRadialGradient(player.x, player.y, 50, player.x, player.y, player.vision);
  grd.addColorStop(0, "rgba(255, 255, 255, 1)");
  grd.addColorStop(1, "rgba(255, 255, 255, 0)");
  
  ctx.fillStyle = grd;
  ctx.arc(player.x, player.y, player.vision, 0, Math.PI*2);
  ctx.fill();
  
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
